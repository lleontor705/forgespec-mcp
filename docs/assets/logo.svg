<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Anvil icon -->
  <g transform="translate(10, 15)">
    <!-- Anvil body -->
    <path d="M15 50 L75 50 L80 70 L70 85 L20 85 L10 70 Z" fill="url(#grad1)" rx="3"/>
    <!-- Anvil top -->
    <rect x="20" y="35" width="50" height="18" rx="4" fill="url(#grad1)"/>
    <!-- Anvil horn -->
    <path d="M70 42 L95 38 L95 48 L70 52 Z" fill="url(#grad1)"/>
    <!-- Spark lines -->
    <line x1="40" y1="25" x2="35" y2="10" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="22" x2="50" y2="5" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="25" x2="65" y2="10" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Spark dots -->
    <circle cx="33" cy="8" r="2" fill="#f97316"/>
    <circle cx="50" cy="3" r="2" fill="#ef4444"/>
    <circle cx="67" cy="8" r="2" fill="#f97316"/>
  </g>
  <!-- Text -->
  <text x="115" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="#e2e8f0">
    Forge<tspan fill="url(#grad2)">Spec</tspan>
  </text>
  <text x="115" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="1">
    MCP Server
  </text>
  <!-- Tagline -->
  <text x="115" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">
    Multi-Agent Coordination for Spec-Driven Development
  </text>
</svg>
