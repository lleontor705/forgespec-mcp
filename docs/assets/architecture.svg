<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" fill="none">
  <defs>
    <linearGradient id="bg-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="accent-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="accent-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="420" rx="12" fill="#020617"/>

  <!-- Title -->
  <text x="350" y="35" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0" text-anchor="middle">
    ForgeSpec MCP Architecture
  </text>

  <!-- MCP Clients Row -->
  <text x="350" y="65" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" text-transform="uppercase" letter-spacing="2">
    MCP CLIENTS
  </text>

  <!-- Claude Code -->
  <g transform="translate(70, 78)" filter="url(#card-shadow)">
    <rect width="120" height="40" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="60" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Claude Code</text>
  </g>
  <!-- Codex CLI -->
  <g transform="translate(210, 78)" filter="url(#card-shadow)">
    <rect width="120" height="40" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="60" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Codex CLI</text>
  </g>
  <!-- Gemini CLI -->
  <g transform="translate(360, 78)" filter="url(#card-shadow)">
    <rect width="120" height="40" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="60" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Gemini CLI</text>
  </g>
  <!-- Custom -->
  <g transform="translate(510, 78)" filter="url(#card-shadow)">
    <rect width="120" height="40" rx="6" fill="url(#bg-card)" stroke="#334155" stroke-width="1"/>
    <text x="60" y="25" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0" text-anchor="middle">Any MCP Client</text>
  </g>

  <!-- Connection lines to server -->
  <line x1="130" y1="118" x2="350" y2="155" stroke="#334155" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="270" y1="118" x2="350" y2="155" stroke="#334155" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="420" y1="118" x2="350" y2="155" stroke="#334155" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="570" y1="118" x2="350" y2="155" stroke="#334155" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Protocol label -->
  <rect x="310" y="128" width="80" height="20" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="350" y="142" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">stdio / MCP</text>

  <!-- ForgeSpec Server Box -->
  <g transform="translate(50, 155)" filter="url(#card-shadow)">
    <rect width="600" height="50" rx="8" fill="url(#accent-purple)" opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="2" y="2" width="596" height="46" rx="7" fill="url(#bg-card)"/>
    <text x="300" y="22" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#a78bfa" text-anchor="middle">ForgeSpec MCP Server</text>
    <text x="300" y="39" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">@modelcontextprotocol/sdk + Zod validation + better-sqlite3</text>
  </g>

  <!-- Tool modules row -->
  <!-- SDD Contracts -->
  <g transform="translate(50, 225)" filter="url(#card-shadow)">
    <rect width="185" height="100" rx="8" fill="url(#bg-card)" stroke="#6366f1" stroke-width="1"/>
    <rect x="0" y="0" width="185" height="30" rx="8" fill="url(#accent-purple)" opacity="0.2"/>
    <rect x="0" y="15" width="185" height="15" fill="url(#accent-purple)" opacity="0.2"/>
    <text x="92" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#a78bfa" text-anchor="middle">SDD Contracts</text>
    <text x="15" y="48" font-family="monospace" font-size="9" fill="#94a3b8">sdd_validate</text>
    <text x="15" y="62" font-family="monospace" font-size="9" fill="#94a3b8">sdd_save / sdd_get</text>
    <text x="15" y="76" font-family="monospace" font-size="9" fill="#94a3b8">sdd_list / sdd_history</text>
    <text x="15" y="90" font-family="monospace" font-size="9" fill="#94a3b8">sdd_phases</text>
  </g>

  <!-- Task Board -->
  <g transform="translate(255, 225)" filter="url(#card-shadow)">
    <rect width="185" height="100" rx="8" fill="url(#bg-card)" stroke="#06b6d4" stroke-width="1"/>
    <rect x="0" y="0" width="185" height="30" rx="8" fill="url(#accent-cyan)" opacity="0.2"/>
    <rect x="0" y="15" width="185" height="15" fill="url(#accent-cyan)" opacity="0.2"/>
    <text x="92" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#22d3ee" text-anchor="middle">Task Board</text>
    <text x="15" y="48" font-family="monospace" font-size="9" fill="#94a3b8">tb_create_board / tb_status</text>
    <text x="15" y="62" font-family="monospace" font-size="9" fill="#94a3b8">tb_add_task / tb_claim</text>
    <text x="15" y="76" font-family="monospace" font-size="9" fill="#94a3b8">tb_update / tb_unblocked</text>
    <text x="15" y="90" font-family="monospace" font-size="9" fill="#94a3b8">tb_get / tb_delete / tb_list</text>
  </g>

  <!-- File Reservation -->
  <g transform="translate(460, 225)" filter="url(#card-shadow)">
    <rect width="185" height="100" rx="8" fill="url(#bg-card)" stroke="#f97316" stroke-width="1"/>
    <rect x="0" y="0" width="185" height="30" rx="8" fill="url(#accent-orange)" opacity="0.2"/>
    <rect x="0" y="15" width="185" height="15" fill="url(#accent-orange)" opacity="0.2"/>
    <text x="92" y="20" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#fb923c" text-anchor="middle">File Reservation</text>
    <text x="15" y="48" font-family="monospace" font-size="9" fill="#94a3b8">file_reserve</text>
    <text x="15" y="62" font-family="monospace" font-size="9" fill="#94a3b8">file_check</text>
    <text x="15" y="76" font-family="monospace" font-size="9" fill="#94a3b8">file_release</text>
    <text x="15" y="90" font-family="monospace" font-size="9" fill="#64748b">TTL-based expiry</text>
  </g>

  <!-- Connection to database -->
  <line x1="350" y1="325" x2="350" y2="350" stroke="#334155" stroke-width="1.5"/>

  <!-- Database -->
  <g transform="translate(200, 350)" filter="url(#card-shadow)">
    <rect width="300" height="55" rx="8" fill="url(#bg-card)" stroke="#22c55e" stroke-width="1"/>
    <rect x="0" y="0" width="300" height="25" rx="8" fill="url(#accent-green)" opacity="0.15"/>
    <rect x="0" y="12" width="300" height="13" fill="url(#accent-green)" opacity="0.15"/>
    <text x="150" y="18" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#4ade80" text-anchor="middle">SQLite Database (WAL mode)</text>
    <text x="150" y="42" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">contracts | boards | tasks | file_reservations | audit_log</text>
  </g>
</svg>
