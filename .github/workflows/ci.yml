name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    uses: lleontor705/ats-deploy/.github/workflows/quality-node.yml@main
    with:
      node-version: "22"
      lint-command: "npm run lint"
      test-command: "npm test"

  security:
    uses: lleontor705/ats-deploy/.github/workflows/security-scan.yml@main

  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
