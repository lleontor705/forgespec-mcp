name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  approve-release:
    name: Approve Release
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - run: echo "Release approved."

  publish:
    needs: approve-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            PKG_VERSION=$(node -p "require('./package.json').version")
            TAG="v${PKG_VERSION}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          npm version "${TAG#v}" --no-git-tag-version --allow-same-version
      - run: npm run build
      - run: npm test
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG" 2>/dev/null && git push origin "$TAG" || echo "Tag exists"
          gh release create "$TAG" --title "$TAG" --generate-notes || echo "Release exists"
